<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NanoTron Notes</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #edf2f4;
        color: #102027;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        display: grid;
        grid-template-columns: 320px 1fr;
        min-height: 100vh;
      }

      aside {
        display: grid;
        align-content: start;
        gap: 16px;
        padding: 24px;
        background: #ffffff;
        border-right: 1px solid #d7e1e5;
      }

      section {
        display: grid;
        align-content: start;
        gap: 18px;
        padding: 28px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        line-height: 1.1;
      }

      h2 {
        font-size: 18px;
      }

      form {
        display: grid;
        gap: 12px;
      }

      input,
      textarea,
      button {
        border-radius: 8px;
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #b9c9cf;
        padding: 11px 12px;
        background: #ffffff;
        color: #102027;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      button {
        border: 0;
        padding: 11px 14px;
        background: #136f63;
        color: #ffffff;
        font-weight: 720;
        cursor: pointer;
      }

      .secondary-button {
        background: #334b54;
      }

      .danger-button {
        background: #b42318;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .notes {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 14px;
      }

      .note {
        display: grid;
        gap: 12px;
        border: 1px solid #d7e1e5;
        border-radius: 8px;
        padding: 16px;
        background: #ffffff;
      }

      .note time {
        color: #60757d;
        font-size: 13px;
      }

      .runtime {
        border-radius: 8px;
        padding: 14px;
        background: #102027;
        color: #cffff7;
        overflow: auto;
      }

      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }

        aside {
          border-right: 0;
          border-bottom: 1px solid #d7e1e5;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <h1>NanoTron Notes</h1>
        <form id="note-form">
          <input id="note-title" name="title" placeholder="Title" autocomplete="off" required>
          <textarea id="note-body" name="body" placeholder="Body"></textarea>
          <button type="submit">Create note</button>
        </form>
        <button class="secondary-button" id="runtime-button" type="button">Runtime info</button>
        <pre class="runtime" id="runtime-output">Ready</pre>
      </aside>
      <section>
        <div class="toolbar">
          <h2>Notes</h2>
          <button class="secondary-button" id="refresh-button" type="button">Refresh</button>
        </div>
        <div class="notes" id="notes"></div>
      </section>
    </main>
    <template id="note-template">
      <article class="note">
        <h2></h2>
        <p></p>
        <time></time>
        <button class="danger-button" type="button">Delete</button>
      </article>
    </template>
    <script>
      const noteForm = document.getElementById("note-form");
      const noteTitle = document.getElementById("note-title");
      const noteBody = document.getElementById("note-body");
      const notesElement = document.getElementById("notes");
      const noteTemplate = document.getElementById("note-template");
      const refreshButton = document.getElementById("refresh-button");
      const runtimeButton = document.getElementById("runtime-button");
      const runtimeOutput = document.getElementById("runtime-output");

      async function renderNotes() {
        const notes = await window.listNotes();
        notesElement.replaceChildren(...notes.map(createNoteElement));
      }

      function createNoteElement(note) {
        const noteElement = noteTemplate.content.firstElementChild.cloneNode(true);
        const titleElement = noteElement.querySelector("h2");
        const bodyElement = noteElement.querySelector("p");
        const timeElement = noteElement.querySelector("time");
        const deleteButton = noteElement.querySelector("button");

        titleElement.textContent = note.title;
        bodyElement.textContent = note.body || "Empty note";
        timeElement.textContent = new Date(note.createdAt).toLocaleString();
        deleteButton.addEventListener("click", async () => {
          await window.deleteNote(note.id);
          await renderNotes();
        });

        return noteElement;
      }

      noteForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        await window.createNote(noteTitle.value, noteBody.value);
        noteForm.reset();
        noteTitle.focus();
        await renderNotes();
      });

      refreshButton.addEventListener("click", renderNotes);

      runtimeButton.addEventListener("click", async () => {
        const runtimeInfo = await window.getRuntimeInfo();
        runtimeOutput.textContent = JSON.stringify(runtimeInfo, null, 2);
      });

      renderNotes();
    </script>
  </body>
</html>
