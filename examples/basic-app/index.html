<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NanoTron Basic App</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f7f8;
        color: #162126;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        display: grid;
        width: min(520px, calc(100vw - 40px));
        gap: 20px;
      }

      h1 {
        margin: 0;
        font-size: 40px;
        font-weight: 760;
        line-height: 1.05;
      }

      button {
        width: fit-content;
        border: 0;
        border-radius: 8px;
        padding: 12px 16px;
        background: #147d64;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      pre {
        min-height: 88px;
        margin: 0;
        border-radius: 8px;
        padding: 16px;
        overflow: auto;
        background: #101618;
        color: #d8fff4;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello World</h1>
      <button id="system-info-button" type="button">System info</button>
      <pre id="system-info-output">Ready</pre>
    </main>
    <script>
      const systemInfoButton = document.getElementById("system-info-button");
      const systemInfoOutput = document.getElementById("system-info-output");

      systemInfoButton.addEventListener("click", async () => {
        try {
          const systemInfo = await window.getSystemInfo();
          systemInfoOutput.textContent = JSON.stringify(systemInfo, null, 2);
        } catch (error) {
          systemInfoOutput.textContent = error instanceof Error ? error.message : String(error);
        }
      });
    </script>
  </body>
</html>
